# Board: Espressif ESP8266 ESP-12E
# Definition: definitions/boards/esp12e/manifest.yaml
esphome:
  name: feyree-11kw-portable-charger
  friendly_name: Feyree 11kW portable charger

esp8266:
  board: esp12e

logger:
  baud_rate: 0

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: Feyree 11kW por Fallback Hotspot
    password: "sPJDmRWaLHl1"

captive_portal:

uart:
  - baud_rate: 9600
    rx_pin: GPIO3
    tx_pin: GPIO1
    id: tuya_uart

web_server:
  port: 80
    
tuya:
  uart_id: tuya_uart
  time_id: homeassistant_time
  on_datapoint_update:
    - sensor_datapoint: 10
      datapoint_type: bitmask
      then:
        - lambda: |2
              std::string state;
              if (x == 0) state = "OK";
              else if (x & 0x0001) state = "Under voltage protection";
              else if (x & 0x0002) state = "Over voltage protection";
              else if (x & 0x0004) state = "Over current protection";
              else if (x & 0x0008) state = "Protective earth error";
              else if (x & 0x0010) state = "Temperature is to high";
              else if (x & 0x0020) state = "Control pilot line error";
              else if (x & 0x0040) state = "Leak";
              else if (x & 0x0080) state = "Relay socket";
              else if (x & 0x0100) state = "Protective earth error 2";
              else if (x & 0x0200) state = "Plug temperature is to high.";
              else if (x & 0x0400) state = "PCB temperature is to high.";
              else if (x & 0x0800) state = "Core temperature is to high.";
              else if (x & 0x1000) state = "ESB";
              else if (x & 0x2000) state = "Socket protective earth error";
              else if (x & 0x4000) state = "Socket leakage";
              else if (x & 0x8000) state = "Socket temperature is to high.";
              else state = "OK";
              id(problem).publish_state(state);
time:
  - platform: homeassistant
    id: homeassistant_time

# --- SENSORS (Telemetry) ---
sensor:
  # Voltage Tracking
  - platform: tuya
    name: "Phase A Voltage"
    sensor_datapoint: 102
    unit_of_measurement: "V"
    accuracy_decimals: 0
    device_class: "voltage"
    filters:
      - multiply: 0.1

  - platform: tuya
    name: "Phase B Voltage"
    sensor_datapoint: 103
    unit_of_measurement: "V"
    accuracy_decimals: 0
    device_class: "voltage"
    filters:
      - multiply: 0.1

  - platform: tuya
    name: "Phase C Voltage"
    sensor_datapoint: 104
    unit_of_measurement: "V"
    accuracy_decimals: 0
    device_class: "voltage"
    filters:
      - multiply: 0.1

  # Current Tracking
  - platform: tuya
    name: "Phase A Current"
    sensor_datapoint: 105
    unit_of_measurement: "A"
    accuracy_decimals: 2
    device_class: "current"
    filters:
      - multiply: 0.1

  - platform: tuya
    name: "Phase B Current"
    sensor_datapoint: 106
    unit_of_measurement: "A"
    accuracy_decimals: 2
    device_class: "current"
    filters:
      - multiply: 0.1

  - platform: tuya
    name: "Phase C Current"
    sensor_datapoint: 107
    unit_of_measurement: "A"
    accuracy_decimals: 2
    device_class: "current"
    filters:
      - multiply: 0.1

  # Power & Energy
  - platform: "tuya"
    sensor_datapoint: 109
    id: power
    name: "Charging Power"
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
    unit_of_measurement: "kW"
    icon: "mdi:flash"
    device_class: "power"
    state_class: measurement

  - platform: tuya
    name: "Internal temperature"
    sensor_datapoint: 110
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    device_class: "temperature"
    entity_category: diagnostic
    filters:
      - multiply: 0.1
  
  - platform: "tuya"
    sensor_datapoint: 112
    id: energy
    name: "Charged Energy"
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
    unit_of_measurement: "kWh"
    icon: "mdi:sigma"
    device_class: "energy"
    state_class: total_increasing


number:
  - platform: "tuya"
    name: "Charge Current"
    number_datapoint: 114
    min_value: 6
    max_value: 16
    step: 1
    unit_of_measurement: "A"
    icon: "mdi:ev-plug-type2"

  - platform: "tuya"
    name: "Delay Time"
    number_datapoint: 118
    min_value: 0
    max_value: 15
    step: 1
    unit_of_measurement: "H"
    icon: mdi:car-clock
    entity_category: "config"

  - platform: "tuya"
    name: "Charge Time"
    number_datapoint: 119
    min_value: 0
    max_value: 15
    step: 1
    unit_of_measurement: "H"
    icon: mdi:car-clock
    entity_category: "config"


select:
  - platform: tuya
    name: "Charging Control"
    enum_datapoint: 124
    icon: "mdi:ev-station"
    options:
      0: "on"
      1: "off"
      2: "on_demand"
    
text_sensor:
  - platform: tuya
    name: "Status"
    icon: mdi:ev-station
    sensor_datapoint: 101
    filters:
      - substitute:
        - "0 -> available"
        - "1 -> plugged_in"
        - "2 -> charging"
        - "3 -> waiting_for_authorization" # not used in portable as it does not have RFID module.
        - "4 -> charged"
        - "5 -> waiting"
        - "6 -> fault"

  - platform: template
    id: problem
    icon: mdi:alert-outline
    name: "Problem"
    entity_category: "diagnostic"
    
switch:
  - platform: restart
    name: "Reboot"
